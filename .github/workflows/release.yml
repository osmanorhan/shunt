name: release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true        # needs Docker-based cross for musl aarch64

          # ── macOS ──────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-latest   # Apple Silicon runner
            cross: false
          - target: x86_64-apple-darwin
            os: macos-13       # last Intel runner
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # x86_64 musl: native toolchain is enough, just need musl-tools
      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      # aarch64 musl: cross handles the Docker-based cross-compilation
      - name: Install cross (aarch64 musl)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: '!matrix.cross'
        run: |
          cargo build --release --locked -p shunt-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --release --locked -p shunt-cli --target ${{ matrix.target }}

      # Package into a .tar.gz archive named shunt-<version>-<target>.tar.gz
      - name: Package
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="shunt-${VERSION}-${TARGET}.tar.gz"

          cp "target/${TARGET}/release/shunt" shunt
          tar czf "${ARCHIVE}" shunt
          rm shunt

          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  # ── Assemble release ────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Checksums
        run: |
          cd dist
          sha256sum shunt-*.tar.gz | tee sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/shunt-*.tar.gz
            dist/sha256sums.txt
